version: '3.8'

services:
  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-remover-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  # 后端服务 (待配置)
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: video-remover-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=your_password
      - DB_NAME=video_remover
      - JWT_SECRET=your_jwt_secret
      - ALIYUN_ACCESS_KEY=your_access_key
      - ALIYUN_SECRET_KEY=your_secret_key
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WECHAT_APP_ID=your_app_id
      - WECHAT_APP_SECRET=your_app_secret
      - WECHAT_MCH_ID=your_merchant_id
      - WECHAT_SERIAL_NO=your_serial_no
      - WECHAT_API_KEY=your_api_key
    depends_on:
      - mysql
      - redis
    networks:
      - app-network
    restart: unless-stopped

  # MySQL 数据库
  mysql:
    image: mysql:5.7
    container_name: video-remover-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=your_password
      - MYSQL_DATABASE=video_remover
      - MYSQL_CHARSET=utf8mb4
      - MYSQL_COLLATION=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: video-remover-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped

# 网络配置
networks:
  app-network:
    driver: bridge

# 数据卷
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
